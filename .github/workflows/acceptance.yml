name: acceptance

# The acceptance suite runs the smplkit CLI against a real platform
# stack standing up on the runner via docker-compose. The IAM role
# assumed below is locked to refs/heads/main, so PRs can't run this
# job. Use `make accept` locally for PR-level validation; this job is
# the post-merge gate (mirrors the terraform-provider acceptance
# workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for the OIDC token exchange with AWS
  contents: read

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acceptance:
    name: cli acceptance tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AWS_REGION: us-east-1
      SMPLKIT_SCHEME: http
      SMPLKIT_BASE_DOMAIN: localhost
      APP_AUTH_SECRET: dev-secret
      # Well-known dev bypass token (defined in python-core's
      # smplcore.rate_limit). Lets the bootstrap step
      # POST /api/v1/auth/register without burning into the 5/hour
      # limit when CI re-runs.
      SMPLKIT_RATE_LIMIT_BYPASS_TOKEN: "7f3e9a2b-1c4d-4e8f-b6a5-9d0e2f8c7b3a"
      SMOKE_BASE_URL: http://app.localhost
    steps:
      - uses: actions/checkout@v4

      - name: configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Repo-scoped variable mirroring the terraform-provider
          # pattern: a CLI-specific IAM role whose trust policy is
          # locked to refs/heads/main on this repo. The role only
          # needs ECR read for pulling the platform images that
          # docker-compose brings up.
          role-to-assume: ${{ vars.AWS_ROLE_ARN_CI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: log in to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "299349364328.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: pull platform images
        working-directory: ci
        run: docker compose pull

      - name: start postgres
        working-directory: ci
        run: |
          docker compose up -d postgres
          # Compose's `service_healthy` gate waits on the declared
          # postgres healthcheck; this loop surfaces the same signal
          # to the workflow log so a postgres-side problem is visible
          # early.
          for i in {1..30}; do
            if docker compose ps postgres --format json \
                | grep -q '"Health":"healthy"'; then
              echo "postgres is healthy"
              break
            fi
            sleep 2
          done

      - name: run alembic migrations
        working-directory: ci
        run: |
          for svc in app config flags logging audit; do
            echo "::group::alembic upgrade head on ${svc}"
            docker compose run --rm --entrypoint "" "$svc" alembic upgrade head
            echo "::endgroup::"
          done

      - name: start platform services
        working-directory: ci
        run: docker compose up -d

      - name: wait for platform liveness
        run: ./scripts/wait_for_platform.sh

      - name: bootstrap account + API key
        id: bootstrap
        uses: smplkit/.github-public/actions/smoke-account@main
        with:
          mode: bootstrap
          base-url: ${{ env.SMOKE_BASE_URL }}
          app-auth-secret: ${{ env.APP_AUTH_SECRET }}
          rate-limit-bypass-token: ${{ env.SMPLKIT_RATE_LIMIT_BYPASS_TOKEN }}

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go.sum

      - name: run acceptance tests
        env:
          SMPLKIT_API_KEY: ${{ steps.bootstrap.outputs.SMPLKIT_API_KEY }}
          ACC: "1"
        run: go test ./acceptance/... -v -timeout 20m -count=1

      - name: dump platform logs on failure
        if: failure()
        working-directory: ci
        run: |
          for svc in postgres caddy app config flags logging audit; do
            echo "::group::logs for ${svc}"
            docker compose logs --tail=200 "$svc" || true
            echo "::endgroup::"
          done

      - name: tear down platform
        if: always()
        working-directory: ci
        run: docker compose down -v --remove-orphans || true
