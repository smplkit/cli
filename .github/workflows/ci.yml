name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build, vet, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: unit tests
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: build
        run: go build -o smplkit .

      - name: smoke (smplkit --help)
        run: ./smplkit --help
