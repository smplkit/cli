version: "2"
linters:
  enable:
    - misspell
    - unconvert
    - unparam
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/smplkit/cli
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
