# smplkit acceptance-test platform for the CLI
#
# Mirrors terraform-provider-smplkit/ci/docker-compose.yml: stands up
# the full smplkit backend stack so the CLI's acceptance suite can run
# against real service responses on a GitHub Actions runner. Five
# services (app, config, flags, logging, audit) plus Postgres plus a
# Caddy reverse proxy mirroring the dev-machine `*.localhost` routing
# — the CLI on the runner's host network reaches every service via
# `http://<service>.localhost`, exactly as on a developer laptop.
#
# Migrations: each service's container CMD is `uvicorn` only
# (ADR-042 §2.9). The calling workflow runs `docker compose run
# --rm <svc> alembic upgrade head` once per service before bringing
# the long-running container set up.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_started
      config:
        condition: service_started
      flags:
        condition: service_started
      logging:
        condition: service_started
      audit:
        condition: service_started

  app:
    image: 299349364328.dkr.ecr.us-east-1.amazonaws.com/app-production-backend-repo-946edcd:latest
    platform: linux/amd64
    environment:
      ENVIRONMENT: ci
      SMPLKIT_ENVIRONMENT: ci
      SMPLKIT_SERVICE: app
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/smplkit_app
      APP_AUTH_SECRET: dev-secret
      APP_AUTH_AUDIENCE: smplkit-app
      APP_AUTH_ISSUER: "http://localhost"
      INTERNAL_JWT_SECRET: local-internal-jwt-secret
      ALLOWED_ORIGINS: '["http://localhost","http://app.localhost"]'
      SESSION_SECRET: ci-session-secret
      AUDIT_URL: "http://audit:8000"
      CONFIG_URL: "http://config:8000"
      FLAGS_URL: "http://flags:8000"
      LOGGING_URL: "http://logging:8000"
    depends_on:
      postgres:
        condition: service_healthy

  config:
    image: 299349364328.dkr.ecr.us-east-1.amazonaws.com/config-production-repo-bfe4d86:latest
    platform: linux/amd64
    environment:
      ENVIRONMENT: ci
      SMPLKIT_ENVIRONMENT: ci
      SMPLKIT_SERVICE: config
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/smplkit_config
      APP_AUTH_SECRET: dev-secret
      APP_AUTH_AUDIENCE: smplkit-app
      APP_AUTH_ISSUER: "http://localhost"
      APP_INTERNAL_URL: "http://app:8000"
      ALLOWED_ORIGINS: '["http://localhost","http://app.localhost"]'
      INTERNAL_JWT_SECRET: local-internal-jwt-secret
      AUDIT_URL: "http://audit:8000"
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  flags:
    image: 299349364328.dkr.ecr.us-east-1.amazonaws.com/flags-production-repo-91741fe:latest
    platform: linux/amd64
    environment:
      ENVIRONMENT: ci
      SMPLKIT_ENVIRONMENT: ci
      SMPLKIT_SERVICE: flags
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/smplkit_flags
      APP_AUTH_SECRET: dev-secret
      APP_AUTH_AUDIENCE: smplkit-app
      APP_AUTH_ISSUER: "http://localhost"
      APP_INTERNAL_URL: "http://app:8000"
      ALLOWED_ORIGINS: '["http://localhost","http://app.localhost"]'
      INTERNAL_JWT_SECRET: local-internal-jwt-secret
      AUDIT_URL: "http://audit:8000"
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  logging:
    image: 299349364328.dkr.ecr.us-east-1.amazonaws.com/logging-production-repo-d436d15:latest
    platform: linux/amd64
    environment:
      ENVIRONMENT: ci
      SMPLKIT_ENVIRONMENT: ci
      SMPLKIT_SERVICE: logging
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/smplkit_logging
      APP_AUTH_SECRET: dev-secret
      APP_AUTH_AUDIENCE: smplkit-app
      APP_AUTH_ISSUER: "http://localhost"
      APP_INTERNAL_URL: "http://app:8000"
      ALLOWED_ORIGINS: '["http://localhost","http://app.localhost"]'
      INTERNAL_JWT_SECRET: local-internal-jwt-secret
      AUDIT_URL: "http://audit:8000"
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started

  audit:
    image: 299349364328.dkr.ecr.us-east-1.amazonaws.com/audit-production-repo-01448c7:latest
    platform: linux/amd64
    environment:
      ENVIRONMENT: ci
      SMPLKIT_ENVIRONMENT: ci
      SMPLKIT_SERVICE: audit
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/smplkit_audit
      APP_AUTH_SECRET: dev-secret
      APP_AUTH_AUDIENCE: smplkit-app
      APP_AUTH_ISSUER: "http://localhost"
      APP_INTERNAL_URL: "http://app:8000"
      ALLOWED_ORIGINS: '["http://localhost","http://app.localhost"]'
      INTERNAL_JWT_SECRET: local-internal-jwt-secret
      AUDIT_URL: "http://audit:8000"
      # Stable test-only Fernet key for the encrypted forwarder.http
      # column. Must be deterministic per CI run; values don't survive
      # the run anyway since the postgres volume isn't persisted.
      AUDIT_ENCRYPTION_KEY: "9PPWaaLBpbJ1Kxph2fQoGoKJ8wGNI0lD_LyIUCj_Hr8="
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
