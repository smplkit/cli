# GoReleaser configuration for the smplkit CLI.
#
# Produces signed cross-platform archives (tar.gz for unix, zip for
# windows), a signed SHA256SUMS file, a multi-arch GHCR Docker image,
# and a GitHub release with the same artifacts attached. The signing
# key (GPG_SIGNING_KEY / GPG_SIGNING_PASSWORD) is exported by the
# release workflow before this runs — same secret the
# terraform-provider release pipeline uses; introduce no new secrets
# here.

version: 2

before:
  hooks:
    - go mod download

builds:
  - id: smplkit
    main: ./
    binary: smplkit
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: 'smplkit_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'smplkit_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # Pinentry-less batch signing of the SHA256SUMS file.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--passphrase"
      - "{{ .Env.GPG_SIGNING_PASSWORD }}"
      - "--pinentry-mode"
      - "loopback"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

# dockers_v2 replaces the legacy dockers + docker_manifests pair: a
# single `docker buildx build` produces the multi-arch manifest
# directly, so the per-arch `-amd64`/`-arm64` intermediate tags are no
# longer published — only the `{{ .Version }}` and `latest` manifests
# remain (same as before). The build context now lays binaries out by
# $TARGETPLATFORM, which is why the Dockerfile copies from that path.
dockers_v2:
  - ids:
      - smplkit
    images:
      - "ghcr.io/smplkit/cli"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    labels:
      org.opencontainers.image.title: smplkit
      org.opencontainers.image.description: smplkit command-line interface
      org.opencontainers.image.source: https://github.com/smplkit/cli
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.licenses: MIT

changelog:
  disable: true
