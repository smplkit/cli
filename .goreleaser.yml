# GoReleaser configuration for the smplkit CLI.
#
# Produces signed cross-platform archives (tar.gz for unix, zip for
# windows), a signed SHA256SUMS file, a multi-arch GHCR Docker image,
# and a GitHub release with the same artifacts attached. The signing
# key (GPG_SIGNING_KEY / GPG_SIGNING_PASSWORD) is exported by the
# release workflow before this runs — same secret the
# terraform-provider release pipeline uses; introduce no new secrets
# here.

version: 2

before:
  hooks:
    - go mod download

builds:
  - id: smplkit
    main: ./
    binary: smplkit
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: 'smplkit_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'smplkit_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # Pinentry-less batch signing of the SHA256SUMS file.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--passphrase"
      - "{{ .Env.GPG_SIGNING_PASSWORD }}"
      - "--pinentry-mode"
      - "loopback"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

dockers:
  - image_templates:
      - "ghcr.io/smplkit/cli:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=smplkit"
      - "--label=org.opencontainers.image.description=smplkit command-line interface"
      - "--label=org.opencontainers.image.source=https://github.com/smplkit/cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/smplkit/cli:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=smplkit"
      - "--label=org.opencontainers.image.description=smplkit command-line interface"
      - "--label=org.opencontainers.image.source=https://github.com/smplkit/cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/smplkit/cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/smplkit/cli:{{ .Version }}-amd64"
      - "ghcr.io/smplkit/cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/smplkit/cli:latest"
    image_templates:
      - "ghcr.io/smplkit/cli:{{ .Version }}-amd64"
      - "ghcr.io/smplkit/cli:{{ .Version }}-arm64"

changelog:
  disable: true
